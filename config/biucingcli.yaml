# Customize your BiucingCLI experience.
# Copy this file to ~/.config/biucingcli/config.yaml and tweak as needed.

frontend:
  preferred: vite-react-typescript
  stacks:
    react:
      tools:
        - name: Next.js
          category: framework
          url: https://nextjs.org
    vite-react-typescript:
      tools:
        - name: Vite
          category: bundler
          url: https://vitejs.dev
        - name: React
          category: framework
          url: https://react.dev
        - name: TypeScript
          category: language
          url: https://www.typescriptlang.org/
        - name: Tailwind CSS
          category: styling
          url: https://tailwindcss.com/

mobile:
  preferred: flutter

backend:
  preferred: gin-micro
  stacks:
    gin-micro:
      description: "【推荐】基于 Go 的完整微服务技术栈，集成 Gin、Go Micro、GORM 和 go-redis"
      tools:
        - name: Gin
          category: web-framework
          url: https://gin-gonic.com/
          description: "高性能 Go Web 框架，快速的路由实现和中间件支持"
        - name: Go Micro
          category: microservice-framework
          url: https://micro.io/
          description: "完整的微服务框架，提供服务发现、RPC 通信、事件驱动等核心功能"
        - name: GORM
          category: orm
          url: https://gorm.io/
          description: "Go 语言 ORM 库，支持多种数据库和自动迁移"
        - name: go-redis
          category: cache
          url: https://redis.uptrace.dev/
          description: "Redis 官方 Go 客户端，支持集群、哨兵和 Pub/Sub"
        - name: Viper
          category: config
          url: https://github.com/spf13/viper
          description: "完整的配置管理解决方案，支持多格式和动态重载"
        - name: JWT-Go
          category: auth
          url: https://github.com/golang-jwt/jwt
          description: "JSON Web Token 实现，用于无状态认证和 API 令牌验证"
        - name: Zap
          category: logging
          url: https://github.com/uber-go/zap
          description: "高性能结构化日志库"
        - name: Swaggo
          category: api-docs
          url: https://github.com/swaggo/swag
          description: "自动生成 RESTful API 文档"
    gin-basic:
      description: "基于 Gin 的基础 Web 服务技术栈"
      tools:
        - name: Gin
          category: web-framework
          url: https://gin-gonic.com/
          description: "高性能 Go Web 框架"
        - name: GORM
          category: orm
          url: https://gorm.io/
          description: "Go 语言 ORM 库"
        - name: Viper
          category: config
          url: https://github.com/spf13/viper
          description: "配置管理库"
        - name: Zap
          category: logging
          url: https://github.com/uber-go/zap
          description: "高性能日志库"
    grpc-micro:
      description: "基于 Go Micro 和 gRPC 的纯微服务技术栈"
      tools:
        - name: Go Micro
          category: microservice-framework
          url: https://micro.io/
          description: "微服务框架"
        - name: gRPC-Go
          category: rpc
          url: https://grpc.io/
          description: "高性能 RPC 框架"
        - name: Protocol Buffers
          category: serialization
          url: https://protobuf.dev/
          description: "语言中立的数据序列化格式"
        - name: GORM
          category: orm
          url: https://gorm.io/
          description: "Go 语言 ORM 库"
        - name: go-redis
          category: cache
          url: https://redis.uptrace.dev/
          description: "Redis 客户端库"

testing:
  preferred: python

devops:
  preferred: python-devops

desktop:
  preferred: cpp-cross-platform
  stacks:
    cpp-cross-platform:
      tools:
        - name: C++20
          category: language
          url: https://en.cppreference.com/w/cpp/20
          description: "Latest modern C++ standard with coroutines, modules, and concepts"
        - name: CMake
          category: build-system
          url: https://cmake.org
          description: "Cross-platform build system generator"
        - name: Conan
          category: package-manager
          url: https://conan.io
          description: "C/C++ package manager for modern C++"
        - name: vcpkg
          category: package-manager
          url: https://github.com/Microsoft/vcpkg
          description: "C++ Library Manager for Windows, Linux, and Mac"
        - name: Ninja
          category: build-system
          url: https://ninja-build.org
          description: "Small build system with a focus on speed"
        - name: Clang
          category: compiler
          url: https://clang.llvm.org
          description: "C++ compiler supporting modern standards"
        - name: GCC
          category: compiler
          url: https://gcc.gnu.org
          description: "GNU Compiler Collection with strong C++ support"
        - name: MSVC
          category: compiler
          url: https://visualstudio.microsoft.com/vs/features/cplusplus/
          description: "Microsoft Visual C++ compiler"
        - name: Boost
          category: libraries
          url: https://www.boost.org
          description: "Comprehensive C++ libraries collection"
        - name: Qt
          category: framework
          url: https://www.qt.io
          description: "Cross-platform application framework"
        - name: Catch2
          category: testing
          url: https://github.com/catchorg/Catch2
          description: "Modern C++ test framework"
        - name: spdlog
          category: logging
          url: https://github.com/gabime/spdlog
          description: "Fast C++ logging library"
        - name: fmt
          category: formatting
          url: https://fmt.dev
          description: "Formatting library for modern C++"

