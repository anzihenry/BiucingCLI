included:
  - App
  - Packages

excluded:
  - .build
  - DerivedData

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - modifier_order
  - trailing_closure

line_length:
  warning: 120
  error: 140

identifier_name:
  min_length: 2
  excluded:
    - id

type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 50

trailing_whitespace:
  ignores_empty_lines: true
